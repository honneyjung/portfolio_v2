<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>아산나눔재단 인덱스</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        border: 0;
        border-spacing: 0;
      }
      table {
        width: 80%;
        border-collapse: collapse;
      }
      table td,
      table th {
        border: solid 1px #e1e1e1;
        padding: 2px;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>아산나눔재단</h1>
      <div>
        <table>
          <colgroup>
            <col style="width: 10%" />
            <col style="width: 20%" />
            <col style="width: 20%" />
            <col style="width: 20%" />
            <col style="width: 15%" />
            <col style="width: 7%" />
            <col style="width: 7%" />
          </colgroup>
          <thead>
            <tr>
              <th>분류</th>
              <th>Depth1</th>
              <th>Depth2</th>
              <th>Depth3</th>
              <th>Page ID</th>
              <th>mobile</th>
              <th>PC</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
