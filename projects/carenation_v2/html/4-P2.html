<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" type="text/css" href="../css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../css/common.css" />
    <link rel="stylesheet" type="text/css" href="../css/pc.css" />
    <link rel="stylesheet" type="text/css" href="../css/mobile.css" />

    <title>고객센터 팝업 - 접수 완료/실패</title>
  </head>

  <body>
    <div>
      <aside class="popup">
        <div class="popup__wrap cs">
          <!-- 접수 완료 -->
          <div class="popup__wrap--tit">
            <img src="../img/icon_success.png" alt="" aria-hidden />
            <h2>접수가 완료되었습니다.</h2>
            <p>문의해주셔서 감사합니다.</p>
          </div>
          <!-- //접수 완료 -->

          <!-- 접수 실패 -->
          <div class="popup__wrap--tit">
            <img src="../img/icon_fail.png" alt="" aria-hidden />
            <h2>접수에 실패했습니다.</h2>
            <p>필수 정보를 모두 입력해주세요.</p>
          </div>
          <!-- //접수 실패 -->

          <!--
            button 1개 일 때 : popup__wrap--btn
            button 2개 일 때 : popup__wrap--btn clearfix
          -->
          <div class="popup__wrap--btn">
            <button type="button" class="">확인</button>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
